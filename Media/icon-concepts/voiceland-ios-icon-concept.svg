  <rect x="112" y="112" width="800" height="800" rx="182" fill="url(#tile)" filter="url(#shadow)"/>
  <rect x="134" y="134" width="756" height="756" rx="162" stroke="white" stroke-opacity="0.72" stroke-width="2"/>

  <path d="M226 206C330 166 442 154 566 166C452 226 390 306 360 404C316 340 270 272 226 206Z" fill="url(#sheen)" opacity="0.92"/>
  <ellipse cx="512" cy="522" rx="264" ry="264" fill="url(#centerGlow)"/>

  <g opacity="0.92" filter="url(#petalBlur)">
    <ellipse cx="512" cy="430" rx="74" ry="136" fill="url(#bluePetal)"/>
    <ellipse cx="612" cy="474" rx="66" ry="124" transform="rotate(38 612 474)" fill="url(#tealPetal)"/>
    <ellipse cx="634" cy="586" rx="62" ry="114" transform="rotate(82 634 586)" fill="url(#greenPetal)"/>
    <ellipse cx="412" cy="474" rx="66" ry="124" transform="rotate(-38 412 474)" fill="url(#pinkPetal)"/>
    <ellipse cx="390" cy="586" rx="62" ry="114" transform="rotate(-82 390 586)" fill="url(#violetPetal)"/>
    <ellipse cx="560" cy="646" rx="54" ry="102" transform="rotate(132 560 646)" fill="url(#amberPetal)"/>
  </g>

  <g opacity="0.9">
    <ellipse cx="512" cy="430" rx="66" ry="122" fill="url(#bluePetal)"/>
    <ellipse cx="600" cy="474" rx="58" ry="110" transform="rotate(38 600 474)" fill="url(#tealPetal)"/>
    <ellipse cx="622" cy="578" rx="54" ry="100" transform="rotate(82 622 578)" fill="url(#greenPetal)"/>
    <ellipse cx="424" cy="474" rx="58" ry="110" transform="rotate(-38 424 474)" fill="url(#pinkPetal)"/>
    <ellipse cx="402" cy="578" rx="54" ry="100" transform="rotate(-82 402 578)" fill="url(#violetPetal)"/>
    <ellipse cx="548" cy="640" rx="46" ry="90" transform="rotate(132 548 640)" fill="url(#amberPetal)"/>
  </g>

  <g filter="url(#coreGlow)">
    <circle cx="512" cy="526" r="92" fill="white" fill-opacity="0.92"/>
    <circle cx="512" cy="526" r="58" fill="#F8FBFF"/>
    <circle cx="512" cy="526" r="22" fill="white" fill-opacity="0.95"/>
  </g>
</svg>
