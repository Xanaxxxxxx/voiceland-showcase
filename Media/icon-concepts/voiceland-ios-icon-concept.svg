<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="156" y1="104" x2="892" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEFEFF"/>
      <stop offset="0.58" stop-color="#F4F7FC"/>
      <stop offset="1" stop-color="#E9EEF8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="284" y1="176" x2="648" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(286)">
      <stop stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="0.3" stop-color="#DDEBFF" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#DDEBFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="88" y="96" width="848" height="848" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#6A7EA8" flood-opacity="0.2"/>
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#FFFFFF" flood-opacity="0.55"/>
    </filter>
    <filter id="petalBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="coreGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bluePetal" x1="512" y1="348" x2="512" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5CA6FF"/>
      <stop offset="1" stop-color="#1E5EFF"/>
    </linearGradient>
    <linearGradient id="tealPetal" x1="620" y1="404" x2="500" y2="564" gradientUnits="userSpaceOnUse">
      <stop stop-color="#54F0E0"/>
      <stop offset="1" stop-color="#1DBBB6"/>
    </linearGradient>
    <linearGradient id="greenPetal" x1="656" y1="530" x2="456" y2="550" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7AF54D"/>
      <stop offset="1" stop-color="#32CE63"/>
    </linearGradient>
    <linearGradient id="pinkPetal" x1="404" y1="406" x2="524" y2="564" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF79C9"/>
      <stop offset="1" stop-color="#F13E92"/>
    </linearGradient>
    <linearGradient id="violetPetal" x1="356" y1="534" x2="562" y2="548" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B676FF"/>
      <stop offset="1" stop-color="#6D5BFF"/>
    </linearGradient>
    <linearGradient id="amberPetal" x1="620" y1="620" x2="492" y2="484" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD34E"/>
      <stop offset="1" stop-color="#FF9F2E"/>
    </linearGradient>
